<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Calculator</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#222">
<style>
  body { margin:0; background:#000; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif; }
  .calc { background:#222; padding:20px; border-radius:20px; width:320px; max-width:90vw; }
  #display { width:100%; height:60px; font-size:32px; text-align:right; background:#111; color:#0f0; border:none; border-radius:10px; margin-bottom:10px; padding:10px; box-sizing:border-box; }
  .btns { display:grid; grid-template-columns: repeat(4,1fr); gap:10px; }
  button { height:60px; font-size:22px; border:none; border-radius:10px; background:#333; color:#fff; }
  button:active { background:#555; }
  .op { background:#ff9500; } .eq { background:#0f0; color:#000; grid-column: span 2; }
</style>
</head>
<body>
<div class="calc">
  <input id="display" disabled>
  <div class="btns">
    <button onclick="clearAll()">C</button><button onclick="del()">⌫</button><button onclick="press('%')" class="op">%</button><button onclick="press('/')" class="op">÷</button>
    <button onclick="press('7')">7</button><button onclick="press('8')">8</button><button onclick="press('9')">9</button><button onclick="press('*')" class="op">×</button>
    <button onclick="press('4')">4</button><button onclick="press('5')">5</button><button onclick="press('6')">6</button><button onclick="press('-')" class="op">-</button>
    <button onclick="press('1')">1</button><button onclick="press('2')">2</button><button onclick="press('3')">3</button><button onclick="press('+')" class="op">+</button>
    <button onclick="press('0')">0</button><button onclick="press('.')">.</button><button onclick="calc()" class="eq">=</button>
  </div>
</div>
<script>
let d=document.getElementById('display');
function press(v){d.value+=v}
function clearAll(){d.value=''}
function del(){d.value=d.value.slice(0,-1)}
function calc(){try{d.value=eval(d.value)}catch{e=d.value='Error'}}
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js')}
</script>
</body>
                                                                                                                                 </html>
